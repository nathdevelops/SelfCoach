name: selfcoach
description: AI-Powered Athlete Movement Capture — auto-records clips when motion is detected.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.10.5+9

  # ML / Pose detection
  google_mlkit_pose_detection: ^0.10.0

  # Video playback
  video_player: ^2.8.6

  # Video processing (trim / concat for pre-trigger buffer)
  ffmpeg_kit_flutter_min: ^6.0.3

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.4

  # Permissions
  permission_handler: ^11.3.1

  # Screen wake lock
  wakelock_plus: ^1.2.8

  # Storage / path utilities
  path_provider: ^2.1.3
  path: ^1.9.0

  # Persistence for settings
  shared_preferences: ^2.3.2

  # UUID generation
  uuid: ^4.4.2

  # Serialisation
  json_annotation: ^4.9.0

  # Thumbnails from video
  video_thumbnail: ^0.5.3

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

  mockito: ^5.4.4
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
